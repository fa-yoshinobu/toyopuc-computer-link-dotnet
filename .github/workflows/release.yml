name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 9.0.x }
      - name: Restore
        run: dotnet restore
      - name: Pack
        run: |
          mkdir out
          $csproj = Get-ChildItem -Path src -Filter "*.csproj" -Recurse | Select-Object -First 1
          dotnet pack $($csproj.FullName) -c Release --output out
      - name: Upload
        shell: pwsh
        env:
          GH_TOKEN: "${{ github.token }}"
        run: |
          $tag = "${{ github.ref_name }}"; if ($tag -notmatch "^v\d") { $tag = "v0.1.2" }
          $assets = Get-ChildItem out -File | Select-Object -ExpandProperty FullName
          if (gh release view $tag) { gh release upload $tag $assets --clobber }
          else { gh release create $tag $assets --title "Release $tag" --generate-notes }
